services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sessionmanager}
      POSTGRES_USER: ${POSTGRES_USER:-sessionmanager}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sessionmanager}
    ports:
      - "${SESSIONMANAGER_POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sessionmanager -d sessionmanager"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - sessionmanager_postgres_data:/var/lib/postgresql/data

  sessionmanager-api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${SESSIONMANAGER_API_PORT:-5000}:5000"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB:-sessionmanager};Username=${POSTGRES_USER:-sessionmanager};Password=${POSTGRES_PASSWORD:-sessionmanager}
      Jwt__Issuer: SessionManager
      Jwt__Audience: SessionManager.Internal
      Jwt__SigningKey: ${SESSIONMANAGER_JWT_SIGNING_KEY:-DEV_ONLY_CHANGE_THIS_KEY_WITH_32_CHARACTERS_MINIMUM}
      Jwt__ExpirationMinutes: 480
      AdminSeed__Username: admin
      AdminSeed__DisplayName: Administrador
      AdminSeed__Password: ${SESSIONMANAGER_ADMIN_PASSWORD:-Admin@12345}
      Agent__ApiKey: ${SESSIONMANAGER_AGENT_API_KEY:-DEV_ONLY_AGENT_KEY_CHANGE_ME}
      Cors__AllowedOrigins__0: ${SESSIONMANAGER_CORS_ORIGIN:-http://localhost:8080}
      Cors__AllowedOrigins__1: http://localhost:5173

  sessionmanager-front:
    build:
      context: .
      dockerfile: Dockerfile.front
      args:
        VITE_API_BASE_URL: ${SESSIONMANAGER_FRONT_API_BASE_URL:-http://localhost:5000}
    restart: unless-stopped
    ports:
      - "${SESSIONMANAGER_FRONT_PORT:-8080}:80"

volumes:
  sessionmanager_postgres_data:
